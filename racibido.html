<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mensaje enviado</title>
  <style>
    body {
      font-family: Georgia, serif;
      background-color: #f5f5f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
 
    .caja {
      background: white;
      padding: 40px;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      text-align: center;
      max-width: 400px;
    }
 
    .icono {
      font-size: 3rem;
      margin-bottom: 16px;
    }
 
    h1 {
      font-size: 1.5rem;
      color: #222;
      margin-bottom: 10px;
    }
 
    p {
      color: #666;
      font-size: 1rem;
    }
 
    a {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 24px;
      background-color: #3a6ea5;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      font-size: 0.95rem;
    }
 
    a:hover {
      background-color: #2e5a8a;
    }
  </style>
</head>
<body>
 
  <div class="caja">
    <div class="icono">✅</div>
    <h1>¡Mensaje enviado!</h1>
    <p>Gracias por escribirnos. Te responderemos lo antes posible.</p>
    <a href="index.html">Volver al inicio</a>
  </div>
 
</body>
</html>
